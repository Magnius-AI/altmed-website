services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      target: production
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      target: production
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
  backend_uploads:
