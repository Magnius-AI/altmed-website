<style>
/* Floating Book Now Button */
.altmed-book-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 9999;
  background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
  color: white;
  padding: 15px 25px;
  border-radius: 50px;
  text-decoration: none;
  font-weight: bold;
  font-size: 16px;
  box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4);
  transition: all 0.3s ease;
  display: flex;
  align-items: center;
  gap: 8px;
}

.altmed-book-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(37, 99, 235, 0.5);
  color: white;
}

.altmed-book-btn svg {
  width: 20px;
  height: 20px;
}

/* Phone button for mobile */
.altmed-call-btn {
  position: fixed;
  bottom: 20px;
  left: 20px;
  z-index: 9999;
  background: #16a34a;
  color: white;
  padding: 15px;
  border-radius: 50%;
  text-decoration: none;
  box-shadow: 0 4px 15px rgba(22, 163, 74, 0.4);
  transition: all 0.3s ease;
}

.altmed-call-btn:hover {
  transform: translateY(-2px);
  background: #15803d;
}

.altmed-call-btn svg {
  width: 24px;
  height: 24px;
  display: block;
}

/* Hide on appointment page (already there) */
body[data-page="appointment"] .altmed-book-btn,
body[data-page="appointment"] .altmed-call-btn {
  display: none;
}

/* Responsive */
@media (max-width: 768px) {
  .altmed-book-btn {
    bottom: 80px;
    right: 15px;
    padding: 12px 20px;
    font-size: 14px;
  }
  
  .altmed-call-btn {
    bottom: 15px;
    left: 15px;
  }
}
</style>

<!-- Book Now Button -->
<a href="https://www.patientfusion.com/doctor/jerry-lee-md-phd-08966" 
   class="altmed-book-btn" 
   target="_blank"
   aria-label="Book Appointment">

  </svg>
  Book Now
</a>
